<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi Santé</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); padding: 20px; color: var(--text); }
        .container { max-width: 900px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin-bottom: 5px; }

        .table-container { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 15px; font-size: 0.85rem; text-transform: uppercase; color: #64748b; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; text-align: center; }

        /* Style regroupé Remboursement */
        .remb-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .box { padding: 4px; border-radius: 4px; font-size: 0.8rem; }
        .mutuelle { background: #e0e7ff; color: #4338ca; }
        .secu { background: #dcfce7; color: #166534; }

        input { border: 1px solid #ddd; padding: 5px; border-radius: 4px; width: 90%; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Mon Suivi Santé</h1>
        <p id="counter">0 en attente</p>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Dépense</th><th>Coût</th>
                    <th>Remboursements (Mutuelle / Sécu)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <button class="btn-add" onclick="ajouterLigne()">+ Ajouter</button>
</div>

<script>
    let rows = JSON.parse(localStorage.getItem('data')) || [];

    function sauvegarder() { localStorage.setItem('data', JSON.stringify(rows)); afficher(); }

    function ajouterLigne() {
        rows.push({ id: Date.now(), date: new Date().toISOString().split('T')[0], desc: "", cout: 0, m: 0, s: 0 });
        sauvegarder();
    }

    function update(id, field, val) {
        let r = rows.find(x => x.id === id);
        r[field] = val;
        sauvegarder();
    }

    function afficher() {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        let attente = 0;

        rows.forEach(r => {
            if (r.m == 0 || r.s == 0) attente++;
            tbody.innerHTML += `<tr>
                <td><input type="date" value="${r.date}" onchange="update(${r.id}, 'date', this.value)"></td>
                <td><input type="text" value="${r.desc}" oninput="update(${r.id}, 'desc', this.value)"></td>
                <td><input type="number" value="${r.cout}" oninput="update(${r.id}, 'cout', this.value)"></td>
                <td>
                    <div class="remb-group">
                        <div class="box mutuelle"><input type="number" value="${r.m}" oninput="update(${r.id}, 'm', this.value)"></div>
                        <div class="box secu"><input type="number" value="${r.s}" oninput="update(${r.id}, 's', this.value)"></div>
                    </div>
                </td>
                <td><button onclick="rows=rows.filter(x=>x.id!=${r.id});sauvegarder()">🗑️</button></td>
            </tr>`;
        });
        document.getElementById("counter").innerText = attente + " remboursements en attente";
    }
    afficher();
</script>
</body>
</html>
