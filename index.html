<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi des Remboursements</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .btn-add { background: #1a2340; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        input { width: 90%; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Suivi des Remboursements</h1>
    <div id="counter">0 en attente</div>
    
    <table id="main-table">
        <thead>
            <tr>
                <th>Date Soin</th><th>Dépense</th><th>Coût</th>
                <th>Mutuelle</th><th>Date Mut.</th>
                <th>Sécu</th><th>Date Sécu</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <br>
    <button class="btn-add" onclick="ajouterLigneVide()">+ Ajouter une ligne</button>
</div>

<script>
    let rows = JSON.parse(localStorage.getItem('sante_data')) || [];

    function sauvegarder() {
        localStorage.setItem('sante_data', JSON.stringify(rows));
        afficherTableau();
    }

    function ajouterLigneVide() {
        // Ajoute un objet vide dans la liste
        rows.push({
            id: Date.now(),
            date: new Date().toISOString().split('T')[0],
            depense: "",
            somme: 0,
            mgen: 0,
            mgenDate: "",
            ameli: 0,
            ameliDate: ""
        });
        afficherTableau();
    }

    function supprimerLigne(id) {
        rows = rows.filter(r => r.id !== id);
        sauvegarder();
    }

    function mettreAJour(id, champ, valeur) {
        let row = rows.find(r => r.id === id);
        if (row) {
            row[champ] = valeur;
            sauvegarder();
        }
    }

    function afficherTableau() {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        let attente = 0;

        rows.forEach(row => {
            if (row.mgen == 0 || row.ameli == 0) attente++;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="date" value="${row.date}" onchange="mettreAJour(${row.id}, 'date', this.value)"></td>
                <td><input type="text" value="${row.depense}" oninput="mettreAJour(${row.id}, 'depense', this.value)"></td>
                <td><input type="number" value="${row.somme}" oninput="mettreAJour(${row.id}, 'somme', this.value)"></td>
                <td><input type="number" value="${row.mgen}" oninput="mettreAJour(${row.id}, 'mgen', this.value)"></td>
                <td><input type="date" value="${row.mgenDate}" onchange="mettreAJour(${row.id}, 'mgenDate', this.value)"></td>
                <td><input type="number" value="${row.ameli}" oninput="mettreAJour(${row.id}, 'ameli', this.value)"></td>
                <td><input type="date" value="${row.ameliDate}" onchange="mettreAJour(${row.id}, 'ameliDate', this.value)"></td>
                <td><button onclick="supprimerLigne(${row.id})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById("counter").innerText = attente + " remboursements en attente";
    }

    // Premier affichage
    afficherTableau();
</script>
</body>
</html>
