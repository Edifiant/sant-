<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Suivi des Remboursements</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  :root {
    --navy: #1a2340;
    --navy2: #243060;
    --green: #2d6a4f;
    --blue: #1d4e89;
    --red: #c0392b;
    --bg: #f0f4ff;
    --card: #ffffff;
    --border: #e2e8f8;
    --text: #1a2340;
    --sub: #6b7a99;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; letter-spacing: -0.3px;
  }
  header p { font-size: 12px; color: #9dafd8; margin-top: 2px; }

  /* ── RÉSUMÉ TOTAUX ── */
  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding: 12px 12px 0;
  }
  .sum-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 10px 8px; text-align: center;
    box-shadow: 0 1px 6px rgba(30,50,120,0.06);
  }
  .sum-card .label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
  .sum-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .sum-card.s-somme .value { color: var(--navy); }
  .sum-card.s-mgen  .value { color: var(--green); }
  .sum-card.s-ameli .value { color: var(--blue); }

  .reste {
    margin: 8px 12px 0;
    background: #fff8ec; border: 1px solid #e8d8a0;
    border-radius: 12px; padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .reste .label { font-size: 12px; color: #7a6930; font-weight: 600; }
  .reste .value { font-size: 18px; font-weight: 700; }
  .reste .value.pos { color: var(--red); }
  .reste .value.neg { color: var(--green); }
  .reste .value.zero { color: #888; }

  /* ── LISTE DES FICHES ── */
  .list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .fiche {
    background: var(--card); border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 10px rgba(30,50,120,0.07);
    overflow: hidden;
  }

  .fiche-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .fiche-header .left { display: flex; align-items: center; gap: 8px; }
  .fiche-date { font-size: 13px; color: var(--sub); font-style: italic; min-width: 40px; }
  .badge {
    display: inline-block; font-size: 11px;
    padding: 2px 9px; border-radius: 20px; font-weight: 600;
  }
  .badge-g  { background: #e8f4ef; color: var(--green); }
  .badge-sp { background: #e8eeff; color: #1a3aad; }

  .fiche-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    font-size: 16px; padding: 4px 6px; border-radius: 8px;
    transition: background 0.15s;
  }
  .btn-icon:active { background: #f0f0f0; }

  .fiche-body {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 10px 14px 12px; gap: 6px 4px;
  }
  .fiche-col { text-align: center; }
  .fiche-col .col-label {
    font-size: 10px; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px;
  }
  .fiche-col .col-val { font-size: 15px; font-weight: 700; }
  .fiche-col .col-sub { font-size: 11px; color: #aaa; font-style: italic; margin-top: 1px; }
  .fiche-col.c-somme .col-val { color: var(--navy); }
  .fiche-col.c-mgen  .col-val { color: var(--green); }
  .fiche-col.c-ameli .col-val { color: var(--blue); }
  .empty-val { color: #ccc; font-weight: 400; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 22px; font-size: 15px; font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer; box-shadow: 0 4px 16px rgba(26,35,64,0.35);
    display: flex; align-items: center; gap: 6px;
    transition: background 0.2s, transform 0.15s;
    z-index: 20;
  }
  .fab:active { transform: scale(0.96); background: var(--navy2); }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,15,35,0.55);
    z-index: 30; display: none; align-items: flex-end;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    padding: 0 0 32px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle {
    display: flex; justify-content: center; padding: 10px 0 4px;
  }
  .modal-handle span {
    width: 36px; height: 4px; border-radius: 2px; background: #dde3f0;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: var(--navy);
    text-align: center; padding: 4px 16px 16px;
  }

  .form-section {
    padding: 0 16px; margin-bottom: 12px;
  }
  .form-section .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--sub); font-weight: 600; margin-bottom: 8px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }

  .form-row { display: grid; gap: 10px; margin-bottom: 10px; }
  .form-row.cols2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols1 { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--sub); font-weight: 600; }

  input.finput, select.finput {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 15px;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text); background: #fff; outline: none;
    width: 100%; transition: border 0.15s;
    -webkit-appearance: none;
  }
  input.finput:focus, select.finput:focus { border-color: var(--navy); }
  input[type="date"].finput { cursor: pointer; }

  .reimb-block {
    background: #f8faff; border-radius: 12px;
    border: 1px solid var(--border); padding: 12px;
    margin-bottom: 10px;
  }
  .reimb-block .rb-title {
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .reimb-block.mgen  .rb-title { color: var(--green); }
  .reimb-block.ameli .rb-title { color: var(--blue); }

  .modal-footer {
    padding: 12px 16px 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .btn-confirm {
    background: var(--green); color: #fff; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600;
    font-family: 'Source Sans 3', sans-serif; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-confirm:active { background: #1e4d38; }
  .btn-dismiss {
    background: #f0f4ff; color: var(--navy); border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600;
    font-family: 'Source Sans 3', sans-serif; cursor: pointer;
  }
  .btn-dismiss:active { background: #dde5f8; }

  .empty-state {
    text-align: center; color: var(--sub); padding: 40px 20px;
    font-size: 15px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <h1>💊 Suivi des Remboursements</h1>
  <p>Dépenses &amp; remboursements santé</p>
</header>

<div class="summary" id="summary"></div>
<div id="reste-wrap"></div>
<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">＋ Ajouter</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"><span></span></div>
    <div class="modal-title" id="modal-title">Nouvelle dépense</div>

    <div class="form-section">
      <div class="section-title">Consultation</div>
      <div class="form-row cols2">
        <div class="form-group">
          <label>Date</label>
          <input class="finput" type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select class="finput" id="f-type">
            <option value="generaliste">Généraliste</option>
            <option value="specialiste">Spécialiste</option>
          </select>
        </div>
      </div>
      <div class="form-row cols1">
        <div class="form-group">
          <label>Somme payée (€)</label>
          <input class="finput" type="number" step="0.01" id="f-somme" placeholder="ex : 30">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Remboursements</div>

      <div class="reimb-block mgen">
        <div class="rb-title">🟢 Mutuelle</div>
        <div class="form-row cols2">
          <div class="form-group">
            <label>Montant (€)</label>
            <input class="finput" type="number" step="0.01" id="f-mgen-m" placeholder="ex : 9">
          </div>
          <div class="form-group">
            <label>Date remb.</label>
            <input class="finput" type="date" id="f-mgen-d">
          </div>
        </div>
      </div>

      <div class="reimb-block ameli">
        <div class="rb-title">🔵 Sécu</div>
        <div class="form-row cols2">
          <div class="form-group">
            <label>Montant (€)</label>
            <input class="finput" type="number" step="0.01" id="f-ameli-m" placeholder="ex : 6">
          </div>
          <div class="form-group">
            <label>Date remb.</label>
            <input class="finput" type="date" id="f-ameli-d">
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-dismiss" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="saveRow()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
let rows = [
  { id:1, date:"2026-02-06", type:"generaliste", somme:30, mgen_m:"9",  mgen_d:"2026-02-12", ameli_m:"6",  ameli_d:"2026-02-12" },
  { id:2, date:"2026-03-03", type:"generaliste", somme:30, mgen_m:"9",  mgen_d:"2026-03-09", ameli_m:"10", ameli_d:"2026-03-04" },
  { id:3, date:"2026-03-11", type:"generaliste", somme:30, mgen_m:"",   mgen_d:"",           ameli_m:"",   ameli_d:"" },
];

let editingId = null;

function fmtDate(iso) {
  if (!iso) return "";
  const p = iso.split("-");
  return parseInt(p[2]) + "/" + parseInt(p[1]);
}
function fmt(v) {
  const n = parseFloat(v);
  if (isNaN(n) || v === "") return "";
  return n.toFixed(2).replace(/\.00$/,"") + " €";
}
function fmtSign(v) {
  if (v === 0) return "0 €";
  const s = Math.abs(v).toFixed(2).replace(/\.00$/,"");
  return (v > 0 ? "+" : "-") + s + " €";
}

function render() {
  // Totaux
  const tS = rows.reduce((s,r)=>s+(parseFloat(r.somme)||0),0);
  const tM = rows.reduce((s,r)=>s+(parseFloat(r.mgen_m)||0),0);
  const tA = rows.reduce((s,r)=>s+(parseFloat(r.ameli_m)||0),0);
  const reste = tS - tM - tA;

  document.getElementById("summary").innerHTML = `
    <div class="sum-card s-somme"><div class="label">Dépensé</div><div class="value">${fmt(tS)||"0 €"}</div></div>
    <div class="sum-card s-mgen"><div class="label">Mutuelle</div><div class="value">${fmt(tM)||"0 €"}</div></div>
    <div class="sum-card s-ameli"><div class="label">Sécu</div><div class="value">${fmt(tA)||"0 €"}</div></div>
  `;

  const rc = reste > 0 ? "pos" : reste < 0 ? "neg" : "zero";
  document.getElementById("reste-wrap").innerHTML = `
    <div class="reste">
      <span class="label">Reste à charge</span>
      <span class="value ${rc}">${reste >= 0 ? "" : ""}${fmt(Math.abs(reste))||"0 €"}${reste < 0 ? " 🎉" : ""}</span>
    </div>
  `;

  // Liste
  const list = document.getElementById("list");
  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>Aucune dépense enregistrée.<br>Appuyez sur <strong>+ Ajouter</strong> pour commencer.</div>`;
    return;
  }

  list.innerHTML = "";
  [...rows].reverse().forEach(row => {
    const div = document.createElement("div");
    div.className = "fiche";

    const mVal = row.mgen_m  ? `<span class="col-val">${row.mgen_m} €</span>${row.mgen_d  ? `<div class="col-sub">le ${fmtDate(row.mgen_d)}</div>`  : ""}` : `<span class="col-val empty-val">—</span>`;
    const aVal = row.ameli_m ? `<span class="col-val">${row.ameli_m} €</span>${row.ameli_d ? `<div class="col-sub">le ${fmtDate(row.ameli_d)}</div>` : ""}` : `<span class="col-val empty-val">—</span>`;
    const sVal = row.somme   ? `<span class="col-val">${row.somme} €</span>` : `<span class="col-val empty-val">—</span>`;

    const badgeHtml = row.type === "generaliste"
      ? `<span class="badge badge-g">Généraliste</span>`
      : `<span class="badge badge-sp">Spécialiste</span>`;

    div.innerHTML = `
      <div class="fiche-header">
        <div class="left">
          <span class="fiche-date">${fmtDate(row.date)||"—"}</span>
          ${badgeHtml}
        </div>
        <div class="fiche-actions">
          <button class="btn-icon" onclick="editRow(${row.id})" title="Modifier">✏️</button>
          <button class="btn-icon" onclick="deleteRow(${row.id})" title="Supprimer">🗑</button>
        </div>
      </div>
      <div class="fiche-body">
        <div class="fiche-col c-somme">
          <div class="col-label">Somme</div>
          ${sVal}
        </div>
        <div class="fiche-col c-mgen">
          <div class="col-label">Mutuelle</div>
          ${mVal}
        </div>
        <div class="fiche-col c-ameli">
          <div class="col-label">Sécu</div>
          ${aVal}
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function openModal(prefill) {
  editingId = prefill ? prefill.id : null;
  document.getElementById("modal-title").textContent = prefill ? "Modifier la dépense" : "Nouvelle dépense";
  document.getElementById("f-date").value    = prefill?.date    || "";
  document.getElementById("f-type").value    = prefill?.type    || "generaliste";
  document.getElementById("f-somme").value   = prefill?.somme   || "";
  document.getElementById("f-mgen-m").value  = prefill?.mgen_m  || "";
  document.getElementById("f-mgen-d").value  = prefill?.mgen_d  || "";
  document.getElementById("f-ameli-m").value = prefill?.ameli_m || "";
  document.getElementById("f-ameli-d").value = prefill?.ameli_d || "";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  editingId = null;
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

function saveRow() {
  const row = {
    date:    document.getElementById("f-date").value,
    type:    document.getElementById("f-type").value,
    somme:   document.getElementById("f-somme").value,
    mgen_m:  document.getElementById("f-mgen-m").value,
    mgen_d:  document.getElementById("f-mgen-d").value,
    ameli_m: document.getElementById("f-ameli-m").value,
    ameli_d: document.getElementById("f-ameli-d").value,
  };
  if (editingId) {
    rows = rows.map(r => r.id === editingId ? { id: r.id, ...row } : r);
  } else {
    rows.push({ id: Date.now(), ...row });
  }
  closeModal();
  render();
}

function editRow(id) {
  const row = rows.find(r => r.id === id);
  if (row) openModal(row);
}

function deleteRow(id) {
  if (confirm("Supprimer cette dépense ?")) {
    rows = rows.filter(r => r.id !== id);
    render();
  }
}

render();
</script>
</body>
</html>
